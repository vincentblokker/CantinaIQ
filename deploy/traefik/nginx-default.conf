server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed Vite assets (index-XXXXX.js, index-XXXXX.css) — cache aggressively.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # JSON exports change when the pipeline re-runs — short cache so reruns
    # propagate within minutes, long enough to absorb refresh-spam during demos.
    location ~* ^/data/.*\.json$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    # SPA fallback — React Router routes (/regions, /producers, /matrix) fall
    # back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache index.html so deploys propagate immediately.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Security hygiene
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }

    location ~ /\. { deny all; }
}
